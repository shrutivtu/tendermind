services:
  - type: web
    name: tendermind-api
    runtime: node
    region: frankfurt          # closest to EU/UK data sources
    plan: free
    buildCommand: npm ci && npm run build --workspace=@tendermind/api
    startCommand: node apps/api/dist/index.js
    healthCheckPath: /healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false            # set in Render dashboard (use Session Pooler URL)
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: TED_API_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: WEB_URL
        sync: false            # set to your Vercel URL e.g. https://tendermind.vercel.app
      - key: ANON_SEARCH_LIMIT
        value: "2"
      - key: USER_MONTHLY_SEARCH_LIMIT
        value: "10"
      - key: UNLIMITED_SEARCH_EMAILS
        sync: false            # comma-separated emails exempt from search limits
      - key: ADMIN_EMAILS
        sync: false            # comma-separated emails allowed on /admin
